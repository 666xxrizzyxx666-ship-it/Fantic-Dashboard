{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div class="page-title">Deals <span>& Promos</span></div>
</div>

<div class="grid g2">
  <!-- Deal -->
  <div class="card">
    <div class="card-title">🛍️ POSTER UN DEAL</div>
    <label>Catégorie</label>
    <select id="d-cat">
      <option value="sneakers">👟 Sneakers</option>
      <option value="vetements">👔 Vêtements</option>
      <option value="parfums">🧴 Parfums</option>
      <option value="tech">📱 Tech</option>
      <option value="accessoires">👜 Accessoires</option>
    </select>
    <label>Titre du produit</label>
    <input type="text" id="d-titre" placeholder="Ex: Nike Air Jordan 4 Violet">
    <div class="grid g2">
      <div>
        <label>Prix</label>
        <input type="text" id="d-prix" placeholder="Ex: 80€">
      </div>
      <div>
        <label>Lien commande</label>
        <input type="url" id="d-lien" placeholder="https://...">
      </div>
    </div>
    <label>Description</label>
    <textarea id="d-desc" placeholder="Description du produit, taille dispo, délai..."></textarea>
    <label>URL Image</label>
    <input type="url" id="d-img" placeholder="https://i.imgur.com/...">
    <button class="btn btn-primary btn-full" onclick="postDeal()">🚀 Poster le deal</button>
  </div>

  <div>
    <!-- Promo -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">💰 PRIX DU MOMENT</div>
      <div class="grid g2">
        <div>
          <label>Produit</label>
          <input type="text" id="p-produit" placeholder="Nom du produit">
        </div>
        <div>
          <label>Durée</label>
          <input type="text" id="p-duree" placeholder="Ex: 24h">
        </div>
      </div>
      <div class="grid g2">
        <div>
          <label>Prix normal</label>
          <input type="text" id="p-normal" placeholder="150€">
        </div>
        <div>
          <label>Prix promo</label>
          <input type="text" id="p-promo" placeholder="90€">
        </div>
      </div>
      <label>Description</label>
      <textarea id="p-desc" placeholder="Description..." style="min-height:60px"></textarea>
      <button class="btn btn-orange btn-full" onclick="postPromo()">💰 Poster la promo</button>
    </div>

    <!-- Restock -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">🔔 RESTOCK</div>
      <div class="grid g2">
        <div>
          <label>Produit</label>
          <input type="text" id="r-produit" placeholder="Nom du produit">
        </div>
        <div>
          <label>Quantité</label>
          <input type="text" id="r-qty" placeholder="Ex: 5 paires">
        </div>
      </div>
      <label>Prix</label>
      <input type="text" id="r-prix" placeholder="Ex: 120€">
      <button class="btn btn-success btn-full" onclick="postRestock()">🔔 Annoncer le restock</button>
    </div>

    <!-- Drop -->
    <div class="card">
      <div class="card-title">📢 DROP À VENIR</div>
      <div class="grid g2">
        <div>
          <label>Titre</label>
          <input type="text" id="dr-titre" placeholder="Nom du produit">
        </div>
        <div>
          <label>Date</label>
          <input type="text" id="dr-date" placeholder="Samedi 15 juin 20h">
        </div>
      </div>
      <label>Description</label>
      <textarea id="dr-desc" placeholder="Description..." style="min-height:60px"></textarea>
      <label>URL Image</label>
      <input type="url" id="dr-img" placeholder="https://...">
      <button class="btn btn-primary btn-full" onclick="postDrop()">📢 Annoncer le drop</button>
    </div>
  </div>
</div>

<script>
async function postDeal(){
  const data={categorie:document.getElementById('d-cat').value,titre:document.getElementById('d-titre').value,prix:document.getElementById('d-prix').value,description:document.getElementById('d-desc').value,image:document.getElementById('d-img').value,lien:document.getElementById('d-lien').value};
  if(!data.titre||!data.prix||!data.description){showToast('Remplis les champs obligatoires','error');return}
  const r=await post('/api/deal',data);
  showToast(r.success?'✅ Deal posté !':'❌ Erreur',r.success?'success':'error');
}
async function postPromo(){
  const data={produit:document.getElementById('p-produit').value,prix_normal:document.getElementById('p-normal').value,prix_promo:document.getElementById('p-promo').value,duree:document.getElementById('p-duree').value,description:document.getElementById('p-desc').value};
  if(!data.produit||!data.prix_promo){showToast('Remplis les champs','error');return}
  const r=await post('/api/promo',data);
  showToast(r.success?'✅ Promo postée !':'❌ Erreur',r.success?'success':'error');
}
async function postRestock(){
  const data={produit:document.getElementById('r-produit').value,quantite:document.getElementById('r-qty').value,prix:document.getElementById('r-prix').value};
  if(!data.produit){showToast('Entre un nom de produit','error');return}
  const r=await post('/api/restock',data);
  showToast(r.success?'✅ Restock annoncé !':'❌ Erreur',r.success?'success':'error');
}
async function postDrop(){
  const data={titre:document.getElementById('dr-titre').value,date:document.getElementById('dr-date').value,description:document.getElementById('dr-desc').value,image:document.getElementById('dr-img').value};
  if(!data.titre||!data.date){showToast('Remplis les champs','error');return}
  const r=await post('/api/drop',data);
  showToast(r.success?'✅ Drop annoncé !':'❌ Erreur',r.success?'success':'error');
}
</script>
{% endblock %}
