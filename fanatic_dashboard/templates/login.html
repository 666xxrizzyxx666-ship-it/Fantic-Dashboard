<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fanatic Ressel — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:#0f0f1a;color:#f0f0ff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0}
.orb{position:absolute;border-radius:50%;filter:blur(100px)}
.o1{width:600px;height:600px;background:rgba(123,47,190,.15);top:-200px;left:-100px}
.o2{width:400px;height:400px;background:rgba(0,229,255,.06);bottom:-100px;right:-50px}
.o3{width:300px;height:300px;background:rgba(155,93,229,.08);top:50%;right:200px;transform:translateY(-50%)}
.card{
  background:rgba(26,26,46,.9);backdrop-filter:blur(20px);
  border:1px solid rgba(155,93,229,.2);border-radius:20px;
  padding:48px 40px;width:100%;max-width:400px;position:relative;z-index:1;
}
.card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(155,93,229,.6),transparent)}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#7B2FBE,#c084fc);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;box-shadow:0 8px 32px rgba(123,47,190,.4)}
.logo h1{font-size:22px;font-weight:800;letter-spacing:-.4px}
.logo p{font-size:12px;color:#4a4a6a;font-family:'JetBrains Mono',monospace;margin-top:4px}
label{display:block;font-size:10px;font-weight:700;color:#4a4a6a;margin-bottom:6px;letter-spacing:1.5px;text-transform:uppercase}
input{
  width:100%;background:rgba(34,34,56,.9);border:1px solid rgba(155,93,229,.2);
  border-radius:10px;padding:13px 16px;color:#f0f0ff;font-size:14px;
  outline:none;margin-bottom:20px;font-family:'Space Grotesk',sans-serif;transition:.2s;
}
input:focus{border-color:#9b5de5;background:rgba(42,42,70,.9);box-shadow:0 0 0 3px rgba(155,93,229,.12)}
.btn{
  width:100%;padding:14px;background:linear-gradient(135deg,#7B2FBE,#9b5de5);
  color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif;
  box-shadow:0 4px 24px rgba(123,47,190,.35);
}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(123,47,190,.5)}
.error{background:rgba(255,23,68,.08);border:1px solid rgba(255,23,68,.2);color:#ff5370;border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:20px;font-weight:500}
</style>
</head>
<body>
<div class="bg">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🔥</div>
    <h1>Fanatic Ressel</h1>
    <p>admin.dashboard / login</p>
  </div>
  {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}
  <form method="POST">
    <label>Mot de passe</label>
    <input type="password" name="password" placeholder="••••••••••••" required autofocus>
    <button type="submit" class="btn">Accéder au dashboard →</button>
  </form>
</div>
</body>
</html>
